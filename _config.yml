# Site settings
title: ApixDenice
description: DIPS & Office Mom — iOS & macOS apps for fitness and healthy habits
email: dennishasselbusch@icloud.com
baseurl: ""
url: "https://apixdenice.github.io"

# iOffice Mom (iPhone): paste your App Store product URL from App Store Connect when ready.
ioffice_mom_app_store_url: "https://apps.apple.com/search?term=iOffice%20Mom"

# Plugins (no remote theme — the site uses its own layout + stylesheet)
plugins:
  - jekyll-feed
  - jekyll-seo-tag

# Navigation (Home, Office Mom, Contact are simple links;
# DIPS is rendered as a dropdown in the layout)
navigation:
  - title: Home
    url: /
  - title: Office Mom
    url: /office-mom
  - title: Contact
    url: /contact

# Build settings
markdown: kramdown
highlighter: rouge

exclude:
  - Gemfile
  - Gemfile.lock
  - README.md
  - DESIGN_RECOMMENDATIONS.md
  - vendor
